<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="Illustrative figure">
  <rect width="600" height="360" fill="#f3ebda"/>

  <!-- Axes -->
  <line x1="60" y1="40" x2="60" y2="320" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="60" y1="320" x2="560" y2="320" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- Gridline -->
  <line x1="60" y1="180" x2="560" y2="180" stroke="#d6cdb6" stroke-width="0.8" stroke-dasharray="3 4"/>

  <!-- Curve -->
  <path d="M60 280 Q200 270 280 220 T540 60" fill="none" stroke="#5b4a2c" stroke-width="2.2"/>

  <!-- Inflection marker -->
  <circle cx="280" cy="220" r="3.5" fill="#3d5a3a"/>
  <text x="290" y="215" font-family="EB Garamond, serif" font-size="13" fill="#3d5a3a" font-style="italic">inflection</text>

  <!-- Axis labels -->
  <text x="300" y="350" font-family="Inter, sans-serif" font-size="13" text-anchor="middle" fill="#7a7266">time →</text>
  <text font-family="Inter, sans-serif" font-size="13" text-anchor="middle" fill="#7a7266" transform="translate(35 180) rotate(-90)">cost</text>

  <!-- Title -->
  <text x="300" y="28" font-family="EB Garamond, serif" font-size="15" text-anchor="middle" fill="#1a1a1a" font-style="italic">Figure 1 — illustrative placeholder</text>
</svg>
