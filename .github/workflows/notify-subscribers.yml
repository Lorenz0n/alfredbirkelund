name: Notify subscribers of new essays

# Triggers AFTER the Deploy workflow finishes successfully on main, so emails
# go out only when the new essay is actually live at the URL we're linking.
on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated last-broadcast.json

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (regenerates dist/rss.xml)
        run: npm run build

      - name: Send Resend broadcasts for new RSS items
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          SITE_URL: https://alfredbirkelund.com
        run: node scripts/send-new-broadcasts.mjs

      - name: Commit updated broadcast log
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add scripts/last-broadcast.json
          if git diff --quiet --cached; then
            echo "No changes to broadcast log."
          else
            git commit -m "Record sent broadcasts [skip ci]"
            git push
          fi
